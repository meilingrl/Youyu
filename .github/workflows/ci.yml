name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x backend/mvnw

      - name: Run backend tests
        working-directory: backend
        run: ./mvnw test -B

  frontend-tests:
    name: Frontend Unit Tests + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Vitest unit tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  playwright-smoke:
    name: Playwright Smoke Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Make mvnw executable
        run: chmod +x backend/mvnw

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium with system deps
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Start backend with seed profile
        working-directory: backend
        run: |
          ./mvnw spring-boot:run -B -Dspring-boot.run.profiles=seed &
          for i in $(seq 1 90); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/products)
            if [ "$code" = "200" ]; then
              echo "Backend ready after ${i}s"
              break
            fi
            if [ $i -eq 90 ]; then
              echo "Backend failed to start within 90s"
              exit 1
            fi
            sleep 1
          done

      - name: Start frontend dev server
        working-directory: frontend
        run: |
          npm run dev -- --host 0.0.0.0 &
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5173)
            if [ "$code" = "200" ]; then
              echo "Frontend ready after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Frontend failed to start within 30s"
              exit 1
            fi
            sleep 1
          done

      - name: Run Playwright smoke tests
        working-directory: frontend
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
