name: CI

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x backend/mvnw

      - name: Run backend tests
        working-directory: backend
        run: ./mvnw test -B

  frontend-tests:
    name: Frontend Unit Tests + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Vitest unit tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  playwright-smoke:
    name: Playwright Smoke Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    timeout-minutes: 20
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: youyu
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Make mvnw executable
        run: chmod +x backend/mvnw

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium with system deps
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Start backend with seed profile
        working-directory: backend
        env:
          MYSQL_PASSWORD: root
          SPRING_PROFILES_ACTIVE: seed
        run: |
          ./mvnw spring-boot:run -B > backend-ci.log 2>&1 &
          for i in $(seq 1 90); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/health || true)
            if [ "$code" = "200" ]; then
              echo "Backend ready after ${i}s"
              break
            fi
            if [ $i -eq 90 ]; then
              echo "Backend failed to start within 90s"
              exit 1
            fi
            sleep 1
          done

      - name: Start frontend dev server
        working-directory: frontend
        run: |
          npm run dev -- --host 0.0.0.0 > frontend-ci.log 2>&1 &
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5173 || true)
            if [ "$code" = "200" ]; then
              echo "Frontend ready after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Frontend failed to start within 30s"
              exit 1
            fi
            sleep 1
          done

      - name: Run Playwright smoke tests
        working-directory: frontend
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080

      - name: Upload Playwright report on failure
        if: failure() && hashFiles('frontend/playwright-report/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Upload CI runtime logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-runtime-logs
          path: |
            backend/backend-ci.log
            frontend/frontend-ci.log
