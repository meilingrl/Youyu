# Demo dataset inserts. Intended for fresh demo/staging databases.
# Example: mvnw.cmd spring-boot:run -Dspring-boot.run.profiles=seed
spring:
  config:
    activate:
      on-profile: seed
  sql:
    init:
      continue-on-error: true
      data-locations: classpath:seed/data.sql,classpath:seed/seed-transactions.sql,classpath:seed/seed-zhangsan-spend.sql,classpath:seed/seed-chat-data.sql,classpath:seed/demo-expansion.sql
