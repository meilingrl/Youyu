spring:
  config:
    activate:
      on-profile: staging
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: YouyuStagingHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
      leak-detection-threshold: ${DB_LEAK_DETECTION_THRESHOLD_MS:0}
      initialization-fail-timeout: ${DB_INITIALIZATION_FAIL_TIMEOUT_MS:1}
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:schema.sql
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:20}
          max-idle: ${REDIS_POOL_MAX_IDLE:10}
          min-idle: ${REDIS_POOL_MIN_IDLE:0}

app:
  jwt:
    secret: ${APP_JWT_SECRET}

youyu:
  auth:
    mock-token-enabled: false
  payment:
    mock-enabled: false
    default-gateway: ${YOUYU_PAYMENT_DEFAULT_GATEWAY:ALIPAY_SANDBOX}
  cors:
    allowed-origins: ${YOUYU_CORS_ALLOWED_ORIGINS:}
    allowed-origin-patterns: ${YOUYU_CORS_ALLOWED_ORIGIN_PATTERNS:}
  cache:
    redis:
      enabled: ${YOUYU_REDIS_CACHE_ENABLED:false}

logging:
  level:
    root: INFO
    com.youyu.backend: INFO
    com.zaxxer.hikari: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level traceId=%X{traceId:-} [%thread] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-components: always
      show-details: never
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
    redis:
      enabled: ${YOUYU_REDIS_HEALTH_ENABLED:false}
