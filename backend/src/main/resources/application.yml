spring:
  application:
    name: youyu-backend
  datasource:
    url: jdbc:mysql://localhost:3306/youyu?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${MYSQL_PASSWORD:yinkaixin123}
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:schema.sql

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

youyu:
  auth:
    enabled: true
    ignored-paths:
      - /api/health
      - /actuator/health
      - /api/auth/login
      - /api/auth/register
      - /api/auth/email-codes
      - /api/auth/captcha
      - /api/auth/password-reset
      - /api/admin/auth/login
      - /error
      - /favicon.ico
  payment:
    default-gateway: MOCK

logging:
  level:
    root: INFO
    com.youyu.backend: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-components: always
      show-details: never
  health:
    db:
      enabled: true
    diskspace:
      enabled: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:youyu-dev-secret-key-replace-in-production-min32}
    expiration-hours: 72
  mail:
    host: ${APP_MAIL_HOST:}
    port: ${APP_MAIL_PORT:465}
    username: ${APP_MAIL_USERNAME:}
    password: ${APP_MAIL_PASSWORD:}
    from: ${APP_MAIL_FROM:}
    ssl-enabled: ${APP_MAIL_SSL_ENABLED:true}
