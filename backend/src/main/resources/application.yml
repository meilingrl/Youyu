spring:
  application:
    name: youyu-backend
  datasource:
    url: jdbc:mysql://localhost:3306/youyu?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${MYSQL_PASSWORD:yinkaixin123}
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:schema.sql
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

youyu:
  auth:
    enabled: true
    ignored-paths:
      - /api/health
      - /actuator/health
      - /api/auth/login
      - /api/auth/register
      - /api/auth/email-codes
      - /api/auth/captcha
      - /api/auth/password-reset
      - /api/admin/auth/login
      - /error
      - /favicon.ico
  payment:
    default-gateway: MOCK
    mock-enabled: ${YOUYU_PAYMENT_MOCK_ENABLED:true}
    attempt-timeout-minutes: ${YOUYU_PAYMENT_ATTEMPT_TIMEOUT_MINUTES:30}
    alipay-sandbox:
      enabled: ${ALIPAY_SANDBOX_ENABLED:false}
      app-id: ${ALIPAY_SANDBOX_APP_ID:}
      private-key: ${ALIPAY_SANDBOX_PRIVATE_KEY:}
      alipay-public-key: ${ALIPAY_SANDBOX_PUBLIC_KEY:}
      notify-url: ${ALIPAY_SANDBOX_NOTIFY_URL:}
      gateway-url: ${ALIPAY_SANDBOX_GATEWAY_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
  logistics:
    amap:
      enabled: ${YOUYU_AMAP_ENABLED:false}
      web-service-key: ${YOUYU_AMAP_WEB_SERVICE_KEY:}
    tracking:
      enabled: ${YOUYU_LOGISTICS_TRACKING_ENABLED:false}
      provider: ${YOUYU_LOGISTICS_TRACKING_PROVIDER:disabled}
      kdniao-business-id: ${KDNIAO_BUSINESS_ID:}
      kdniao-app-key: ${KDNIAO_APP_KEY:}
      kdniao-endpoint: ${KDNIAO_ENDPOINT:https://api.kdniao.com/Ebusiness/EbusinessOrderHandle.aspx}
      timeout-seconds: ${YOUYU_LOGISTICS_TRACKING_TIMEOUT_SECONDS:5}
  upload:
    avatar:
      root-path: data/uploads/avatars
      public-path: /uploads/avatars/
      max-size-bytes: 10485760
      allowed-content-types:
        - image/jpeg
        - image/png
        - image/webp
  search:
    meilisearch:
      enabled: ${MEILISEARCH_ENABLED:false}
      host: ${MEILISEARCH_HOST:http://localhost:7700}
      api-key: ${MEILISEARCH_API_KEY:}
      product-index: ${MEILISEARCH_PRODUCT_INDEX:youyu_products}
      timeout: ${MEILISEARCH_TIMEOUT:2s}

logging:
  level:
    root: INFO
    com.youyu.backend: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-components: always
      show-details: never
  health:
    db:
      enabled: true
    diskspace:
      enabled: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:youyu-dev-secret-key-replace-in-production-min32}
    expiration-hours: 72
  mail:
    host: ${APP_MAIL_HOST:}
    port: ${APP_MAIL_PORT:465}
    username: ${APP_MAIL_USERNAME:}
    password: ${APP_MAIL_PASSWORD:}
    from: ${APP_MAIL_FROM:}
    ssl-enabled: ${APP_MAIL_SSL_ENABLED:true}
