services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-youyu}
      MYSQL_USER: ${DB_USERNAME:-youyu}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD}
    ports:
      - "${DB_PORT:-13306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: staging
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-youyu}
      DB_USERNAME: ${DB_USERNAME:-youyu}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET:?Set APP_JWT_SECRET}
      ALIPAY_SANDBOX_ENABLED: ${ALIPAY_SANDBOX_ENABLED:-false}
      ALIPAY_SANDBOX_APP_ID: ${ALIPAY_SANDBOX_APP_ID:-}
      ALIPAY_SANDBOX_PRIVATE_KEY: ${ALIPAY_SANDBOX_PRIVATE_KEY:-}
      ALIPAY_SANDBOX_PUBLIC_KEY: ${ALIPAY_SANDBOX_PUBLIC_KEY:-}
      ALIPAY_SANDBOX_NOTIFY_URL: ${ALIPAY_SANDBOX_NOTIFY_URL:-}
      ALIPAY_SANDBOX_GATEWAY_URL: ${ALIPAY_SANDBOX_GATEWAY_URL:-https://openapi-sandbox.dl.alipaydev.com/gateway.do}
      APP_MAIL_HOST: ${APP_MAIL_HOST:-}
      APP_MAIL_PORT: ${APP_MAIL_PORT:-465}
      APP_MAIL_USERNAME: ${APP_MAIL_USERNAME:-}
      APP_MAIL_PASSWORD: ${APP_MAIL_PASSWORD:-}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-}
      APP_MAIL_SSL_ENABLED: ${APP_MAIL_SSL_ENABLED:-true}
      MEILISEARCH_ENABLED: ${MEILISEARCH_ENABLED:-false}
      MEILISEARCH_HOST: ${MEILISEARCH_HOST:-http://localhost:7700}
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-}
      MEILISEARCH_PRODUCT_INDEX: ${MEILISEARCH_PRODUCT_INDEX:-youyu_products}
      MEILISEARCH_TIMEOUT: ${MEILISEARCH_TIMEOUT:-2s}
      YOUYU_AMAP_ENABLED: ${YOUYU_AMAP_ENABLED:-false}
      YOUYU_AMAP_WEB_SERVICE_KEY: ${YOUYU_AMAP_WEB_SERVICE_KEY:-}
      YOUYU_LOGISTICS_TRACKING_ENABLED: ${YOUYU_LOGISTICS_TRACKING_ENABLED:-false}
      YOUYU_LOGISTICS_TRACKING_PROVIDER: ${YOUYU_LOGISTICS_TRACKING_PROVIDER:-disabled}
      KDNIAO_BUSINESS_ID: ${KDNIAO_BUSINESS_ID:-}
      KDNIAO_APP_KEY: ${KDNIAO_APP_KEY:-}
      KDNIAO_ENDPOINT: ${KDNIAO_ENDPOINT:-https://api.kdniao.com/Ebusiness/EbusinessOrderHandle.aspx}
      YOUYU_LOGISTICS_TRACKING_TIMEOUT_SECONDS: ${YOUYU_LOGISTICS_TRACKING_TIMEOUT_SECONDS:-5}
    ports:
      - "${BACKEND_PORT:-18081}:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AMAP_JS_KEY: ${VITE_AMAP_JS_KEY:-}
        VITE_AMAP_SECURITY_CODE: ${VITE_AMAP_SECURITY_CODE:-}
    ports:
      - "${HTTP_PORT:-18080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql-data:
