name: CampusMarket CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    name: Backend Build
    runs-on: windows-latest
    defaults:
      run:
        working-directory: CampusMarket/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        shell: cmd
        run: mvnw.cmd test

  frontend:
    name: Frontend Build
    runs-on: windows-latest
    defaults:
      run:
        working-directory: CampusMarket/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: CampusMarket/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
